development:
  collect_transit_snapshot:
    class: CollectTransitSnapshotJob
    schedule: every 15 seconds
  prune_old_snapshots:
    class: PruneOldSnapshotsJob
    schedule: every hour

production:
  collect_transit_snapshot:
    class: CollectTransitSnapshotJob
    schedule: every 15 seconds
  prune_old_snapshots:
    class: PruneOldSnapshotsJob
    schedule: every hour
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
